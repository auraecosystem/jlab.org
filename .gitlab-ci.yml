stages:
  - build
  - deploy

build_docs:
  image: node:20
  stage: build
  script:
    - npm ci
    - DEPLOY_ENV=production npm run build
  artifacts:
    paths:
      - build/
  rules:
    # Only run when changes land on the default branch (e.g. after MR merge)
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

pages:
  image: node:20
  stage: deploy
  script:
    - mv build public
  artifacts:
    paths:
      - public
  rules:
    # Only deploy Pages from the default branch
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
